<svg viewBox="0 0 940 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,system-ui,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Kernel synthesis vs doppl-prime — aligned and divergent</title>
  <desc id="d">A shared foundation of safety and correctness commitments, with divergence only at the organizing-metaphor layer.</desc>
  <style>
    .bg{fill:#0d1117}
    .ink{fill:#e6edf3} .dim{fill:#8b949e} .faint{fill:#6e7681}
    .h{font-size:21px;font-weight:700} .sub{font-size:13px}
    .lbl{font-size:13px;font-weight:700} .small{font-size:11.5px} .tiny{font-size:10.5px;letter-spacing:.05em}
    .shared{fill:#11201a;stroke:#2f6b3a;stroke-width:1.5}
    .chip{fill:#15251a;stroke:#244a2c;stroke-width:1}
    .prime{fill:#1b1726;stroke:#bc8cff;stroke-width:1.5}
    .synth{fill:#16202c;stroke:#58a6ff;stroke-width:1.5}
    .pchip{fill:#1a1622;stroke:#3b2d52;stroke-width:1}
    .schip{fill:#121d2b;stroke:#264563;stroke-width:1}
  </style>
  <rect class="bg" x="0" y="0" width="940" height="600"/>
  <text class="ink h" x="32" y="42">Aligned foundation · divergent metaphor</text>
  <text class="dim sub" x="32" y="64">They agree on what's SAFE and TRUE. They differ on what the system fundamentally IS.</text>

  <!-- legend -->
  <rect x="640" y="28" width="12" height="12" rx="3" class="shared"/><text class="faint tiny" x="658" y="38">shared (both keep)</text>
  <rect x="640" y="46" width="12" height="12" rx="3" class="prime"/><text class="faint tiny" x="658" y="56">prime</text>
  <rect x="772" y="46" width="12" height="12" rx="3" class="synth"/><text class="faint tiny" x="790" y="56">synthesis</text>

  <!-- SHARED foundation slab -->
  <rect class="shared" x="32" y="86" width="876" height="150" rx="12"/>
  <text class="ink lbl" x="50" y="112">SHARED FOUNDATION — every safety / correctness commitment is kept</text>
  <!-- chips row 1 -->
  <g>
    <rect class="chip" x="50" y="126" width="200" height="34" rx="8"/><text class="dim small" x="60" y="148">Evolution = the core loop</text>
    <rect class="chip" x="262" y="126" width="200" height="34" rx="8"/><text class="dim small" x="272" y="148">2 subtypes (±5-yr test)</text>
    <rect class="chip" x="474" y="126" width="210" height="34" rx="8"/><text class="dim small" x="484" y="148">Manufactured fitness</text>
    <rect class="chip" x="696" y="126" width="196" height="34" rx="8"/><text class="dim small" x="706" y="148">Held-out judge (immovable)</text>
  </g>
  <!-- chips row 2 -->
  <g>
    <rect class="chip" x="50" y="168" width="200" height="34" rx="8"/><text class="dim small" x="60" y="190">2 ledgers (sprout/afrit)</text>
    <rect class="chip" x="262" y="168" width="200" height="34" rx="8"/><text class="dim small" x="272" y="190">Finite by construction</text>
    <rect class="chip" x="474" y="168" width="210" height="34" rx="8"/><text class="dim small" x="484" y="190">Decay / why-now</text>
    <rect class="chip" x="696" y="168" width="196" height="34" rx="8"/><text class="dim small" x="706" y="190">Safety invariants</text>
  </g>
  <text class="faint tiny" x="50" y="222">append-only truth · no arbitrary code · secrets never in prompts · candidate-as-data isolation</text>

  <!-- DIVERGENCE layer -->
  <text class="ink lbl" x="32" y="276">DIVERGENCE — only at the organizing-metaphor layer</text>

  <!-- 4 divergence rows: prime | synthesis -->
  <!-- headers -->
  <text class="faint tiny" x="250" y="298" text-anchor="middle">doppl-prime says</text>
  <text class="faint tiny" x="690" y="298" text-anchor="middle">synthesis says</text>

  <!-- row 1: primitive -->
  <text class="dim tiny" x="32" y="324">PRIMITIVE</text>
  <rect class="prime" x="70" y="308" width="360" height="36" rx="8"/><text class="ink small" x="84" y="331">Unit = the agenome (a scaffold)</text>
  <rect class="synth" x="510" y="308" width="368" height="36" rx="8"/><text class="ink small" x="524" y="331">Unit = the operation; direction is primitive</text>

  <!-- row 2: fitness -->
  <text class="dim tiny" x="32" y="372">FITNESS</text>
  <rect class="prime" x="70" y="356" width="360" height="36" rx="8"/><text class="ink small" x="84" y="379">Components → one combined total</text>
  <rect class="synth" x="510" y="356" width="368" height="36" rx="8"/><text class="ink small" x="524" y="379">2 warring axes; collapse deferred</text>

  <!-- row 3: dial -->
  <text class="dim tiny" x="32" y="420">THE DIAL</text>
  <rect class="prime" x="70" y="404" width="360" height="36" rx="8"/><text class="ink small" x="84" y="427">Many separate knobs</text>
  <rect class="synth" x="510" y="404" width="368" height="36" rx="8"/><text class="ink small" x="524" y="427">One master dial (explore↔exploit)</text>

  <!-- row 4: posture -->
  <text class="dim tiny" x="32" y="468">POSTURE</text>
  <rect class="prime" x="70" y="452" width="360" height="36" rx="8"/><text class="ink small" x="84" y="475">Contract-first · executable NOW</text>
  <rect class="synth" x="510" y="452" width="368" height="36" rx="8"/><text class="ink small" x="524" y="475">Prove kernel in crucible → port</text>

  <!-- the fair test footer -->
  <rect x="32" y="508" width="876" height="68" rx="12" fill="#161b22" stroke="#2a3340" stroke-width="1.5"/>
  <text class="ink lbl" x="50" y="532">THE FAIR TEST (what settles it)</text>
  <text class="dim small" x="50" y="552">Build the kernel · run the SAME SEED diverge-vs-converge · does it give better/more-controllable output</text>
  <text class="dim small" x="50" y="569">with FEWER concepts? Yes → earns a prime branch. No → a variant, and prime's head-start wins.</text>
</svg>
