services:
  # Serves the root kernel proof hub (index.html). index.html is gitignored, so
  # build_index.py regenerates it at build time from committed pages under
  # kernel-rebuild/published/. A plain static server then serves the repo root so
  # the hub and linked pages resolve. Kernel pages are generated by node tooling
  # (`pnpm publish:html`) and committed to kernel-rebuild/published/, so the
  # python-only deploy build does not need node.
  - type: web
    name: doppl-agarden
    runtime: python
    repo: https://github.com/Doppl-Life/mh-doppl-spike
    branch: main
    plan: free
    buildCommand: python3 build_index.py
    startCommand: python -m http.server "$PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
