services:
  # Serves the root Agarden hub (index.html) — the findable entry point that lists every
  # trace currently alive across spikes AND every committed HTML page under
  # kernel-rebuild/published/. index.html is gitignored, so build_index.py must regenerate
  # it at build time; a plain static file server then serves the repo root so the hub and
  # its linked pages resolve. (Python runtime guarantees python3 is present — a static-site
  # build cannot, and a silent failure would 404 the root.) Kernel pages are generated by
  # node tooling (`pnpm publish:html`) and committed to kernel-rebuild/published/, so the
  # python-only build does not need node to surface them.
  - type: web
    name: doppl-agarden
    runtime: python
    repo: https://github.com/Doppl-Life/mh-doppl-spike
    branch: main
    plan: free
    buildCommand: python build_index.py
    startCommand: python -m http.server "$PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
