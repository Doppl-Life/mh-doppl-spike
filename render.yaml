services:
  - type: web
    name: doppl-fusion-demo
    runtime: python
    repo: https://github.com/MichaelHabermas/doppl-test
    branch: main
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: OPENROUTER_API_KEY
        sync: false
