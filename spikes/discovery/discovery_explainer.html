<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Doppl Discovery — how it works</title>
<link rel="stylesheet" href="https://esm.sh/reactflow@11.11.4/dist/style.css" />
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3340;
    --ink:#e6edf3; --dim:#8b949e; --faint:#6e7681;
    --good:#3fb950; --good2:#1b5e20; --warn:#d29922; --bad:#f85149; --bad2:#7d1a1a;
    --blue:#58a6ff; --violet:#bc8cff; --cyan:#56d4dd;
  }
  *{box-sizing:border-box}
  html,body,#root{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
  .app{display:flex;flex-direction:column;height:100%}
  header{padding:16px 22px 0 22px;border-bottom:1px solid var(--border);background:var(--bg)}
  header h1{margin:0;font-size:19px;letter-spacing:-.2px}
  header h1 .accent{color:var(--blue)}
  header p{margin:5px 0 12px;color:var(--dim);font-size:13px;max-width:820px}
  .tabs{display:flex;gap:4px}
  .tab{padding:9px 16px;border:1px solid var(--border);border-bottom:none;
    background:var(--panel);color:var(--dim);border-radius:8px 8px 0 0;cursor:pointer;
    font-size:13px;font-weight:600;transition:.12s}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--panel2);color:var(--ink);border-color:var(--blue);
    box-shadow:inset 0 2px 0 var(--blue)}
  main{flex:1;min-height:0;position:relative}
  .view{position:absolute;inset:0;overflow:auto}
  .pad{padding:22px}

  .rf-node{border-radius:10px;border:1px solid var(--border);background:var(--panel);
    padding:10px 12px;width:194px;box-shadow:0 1px 3px rgba(0,0,0,.45)}
  .rf-node .kicker{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
  .rf-node .title{font-size:13px;font-weight:700;line-height:1.25}
  .rf-node .desc{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.42}
  .rf-node.io{background:linear-gradient(180deg,#16202c,#131a24);border-color:#2b3b4d}
  .rf-node.brain{border-color:var(--violet);background:linear-gradient(180deg,#1e1830,#171522)}
  .rf-node.ledger{border-color:#2f6b3a;background:linear-gradient(180deg,#15251a,#131d16)}
  .rf-node.loop{border-color:var(--cyan);background:linear-gradient(180deg,#0f2429,#0e1d22)}
  .rf-node.out{border-color:var(--blue);background:linear-gradient(180deg,#13233b,#101a2b)}
  .rf-node .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;
    background:#232b36;color:var(--dim);margin-top:7px;margin-right:4px}
  .react-flow__handle{width:6px;height:6px;background:var(--faint);border:none}
  .react-flow__edge-path{stroke:#3a4453;stroke-width:1.5}
  .react-flow__edge.anim .react-flow__edge-path{stroke:var(--blue);stroke-dasharray:5;animation:dash 1s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-10}}
  .react-flow__attribution{display:none}
  .legend{position:absolute;right:14px;bottom:14px;background:var(--panel);border:1px solid var(--border);
    border-radius:8px;padding:11px 13px;font-size:11px;z-index:5;max-width:240px}
  .legend b{color:var(--ink);font-size:11.5px} .legend .row{display:flex;align-items:center;gap:7px;margin:4px 0;color:var(--dim)}
  .swatch{width:11px;height:11px;border-radius:3px;flex:none}

  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .chip{padding:5px 11px;border:1px solid var(--border);background:var(--panel);color:var(--dim);
    border-radius:20px;cursor:pointer;font-size:12px;font-weight:600}
  .chip.on{border-color:var(--blue);color:var(--ink);background:var(--panel2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px 16px;
    display:flex;flex-direction:column;gap:9px;transition:.12s}
  .card:hover{border-color:#3b4654}
  .card.promoted{border-color:var(--good2)} .card.rejected{opacity:.5}
  .card.expired{opacity:.4;border-style:dashed}
  .chead{display:flex;align-items:flex-start;gap:11px}
  .score{flex:none;width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:18px;color:#fff}
  .ctitle{font-size:14.5px;font-weight:700;line-height:1.25}
  .pillrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
  .pill{font-size:10.5px;padding:2px 8px;border-radius:11px;background:#232b36;color:var(--dim);border:1px solid var(--border)}
  .pill.z{color:#ffd9a0;border-color:#5a4422} .pill.t{color:#a0d8ff;border-color:#22455a}
  .pill.src{color:var(--cyan)} .pill.st{color:var(--good)}
  .why{font-size:12.5px;color:var(--ink)}
  .pr{background:var(--bg);border-radius:8px;padding:10px 11px;font-size:11.5px;border:1px solid var(--border)}
  .pr div{margin:3px 0;color:#c9d1d9} .pr b{color:var(--faint);display:inline-block;min-width:98px;font-weight:600;vertical-align:top}
  .acts{display:flex;gap:8px;margin-top:2px}
  .btn{flex:1;padding:7px;border-radius:7px;border:1px solid var(--border);background:var(--panel2);
    color:var(--dim);cursor:pointer;font-size:12px;font-weight:700;transition:.12s}
  .btn:hover{color:var(--ink);border-color:#3b4654}
  .btn.promote.active{background:var(--good2);border-color:var(--good);color:#d6ffd9}
  .btn.reject.active{background:var(--bad2);border-color:var(--bad);color:#ffd9d6}

  .two{display:grid;grid-template-columns:1.25fr 1fr;gap:22px;align-items:start}
  @media(max-width:900px){.two{grid-template-columns:1fr}}
  h3.sec{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:0 0 11px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  th,td{text-align:left;padding:8px 11px;font-size:12.5px;border-bottom:1px solid var(--border)}
  th{color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  td.s-productive{color:var(--good)} td.s-unreachable{color:var(--faint)}
  td.s-broken,td.s-polluting{color:var(--bad)} td.s-untested{color:var(--warn)} td.s-working{color:var(--good)}
  .bar{height:6px;background:#232b36;border-radius:4px;overflow:hidden;margin-top:4px;min-width:60px}
  .bar>span{display:block;height:100%;background:var(--blue)}
  .ladder{display:flex;flex-direction:column;gap:8px}
  .rung{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--border);
    border-radius:9px;padding:10px 13px}
  .rung .n{width:24px;height:24px;border-radius:6px;background:var(--panel2);display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:12px;color:var(--dim);flex:none}
  .rung .lab{font-weight:700;font-size:13px} .rung .sub{font-size:11.5px;color:var(--dim)}
  .rung .cost{margin-left:auto;font-size:10.5px;padding:2px 8px;border-radius:10px;flex:none;font-weight:700}
  .cost.free{background:#15251a;color:var(--good)} .cost.cheap{background:#23200f;color:var(--warn)}
  .cost.dear{background:var(--bad2);color:#ffb3ad}
  .note{font-size:12.5px;color:var(--dim);background:var(--panel);border:1px solid var(--border);
    border-left:3px solid var(--blue);border-radius:7px;padding:12px 14px;margin-top:16px}
  .note b{color:var(--ink)}
  .statline{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 16px;min-width:120px}
  .stat .v{font-size:23px;font-weight:800} .stat .l{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
</style>
</head>

  // human + reality loop
  N("human", 1325, 75, "loop", "6 · interaction", "Promote / reject", "Your real decisions = realized value", ["append-only"]),
  N("calib", 1325, 215, "loop", "loop", "Calibration", "Predicted (lens) vs realized (promotion) gap", ["self-tuning"]),
  N("reality", 1325, 345, "loop", "7 · reality", "Backtest", "Was it right? +4/+5 came true 1.0 on resolved corpus", ["bedrock"]),
];

const E = (s, t, anim = false) => ({ id: s + t, source: s, target: t, animated: false, className: anim ? "anim" : "" });
const pedges = [
  E("src", "harvest", true), E("src", "ladder"),
  E("harvest", "recover", true), E("ladder", "recover"),
  E("recover", "classify"), E("classify", "lens"),
  E("lens", "signed", true), E("lens", "decay"),
  E("signed", "feed", true), E("signed", "traps"),
  E("decay", "feed"),
  E("feed", "registry"), E("feed", "recipes"),
  E("feed", "human", true),
  E("human", "calib"), E("calib", "lens"),
  E("human", "reality"), E("reality", "feed"),
  E("registry", "ladder"),
];

function Pipeline() {
  return h("div", { className: "view" },
    h(ReactFlow, {
      nodes: pnodes, edges: pedges, nodeTypes,
      fitView: true, fitViewOptions: { padding: 0.12 },
      minZoom: 0.3, maxZoom: 1.5, proOptions: { hideAttribution: true },
      nodesDraggable: true, nodesConnectable: false, elementsSelectable: true,
    },
      h(Background, { color: "#1c2530", gap: 22 }),
      h(Controls, { showInteractive: false })
    ),
    h("div", { className: "legend" },
      h("b", null, "Reading the map"),
      h("div", { className: "row" }, h("span", { className: "swatch", style: { background: "#16202c", border: "1px solid #2b3b4d" } }), "input / output"),
      h("div", { className: "row" }, h("span", { className: "swatch", style: { background: "#1e1830", border: "1px solid var(--violet)" } }), "the brain (LLM)"),
      h("div", { className: "row" }, h("span", { className: "swatch", style: { background: "#15251a", border: "1px solid #2f6b3a" } }), "ledger (memory)"),
      h("div", { className: "row" }, h("span", { className: "swatch", style: { background: "#0f2429", border: "1px solid var(--cyan)" } }), "feedback loop"),
      h("div", { className: "row", style: { marginTop: 6, color: "var(--faint)" } }, "drag nodes · scroll to zoom")
    )
  );
}

/* ===================================================================== */
/* VIEW 2 — IDEAS (output + scoring + interaction)                        */
/* ===================================================================== */
function Ideas() {
  const [statuses, setStatuses] = useState(() => ({ ...DATA.statuses }));
  const [filter, setFilter] = useState("all");
  const [lensInfo, setLensInfo] = useState(false);

  const set = (id, st) => setStatuses((s) => ({ ...s, [id]: s[id] === st ? undefined : st }));

  const ideas = DATA.ideas;
  const counts = useMemo(() => {
    let p = 0, r = 0;
    Object.values(statuses).forEach((v) => { if (v === "promoted") p++; if (v === "rejected") r++; });
    return { p, r, total: ideas.length };
  }, [statuses, ideas]);

  const shown = ideas.filter((it) => {
    if (filter === "all") return true;
    if (filter === "zeitgeist") return it.subtype === "zeitgeist_synthesis";
    if (filter === "transfer") return it.subtype === "cross_domain_transfer";
    if (filter === "promoted") return statuses[it.id] === "promoted";
    return true;
  });

  return h("div", { className: "view pad" },
    h("div", { className: "statline" },
      h("div", { className: "stat" }, h("div", { className: "v" }, counts.total), h("div", { className: "l" }, "candidates")),
      h("div", { className: "stat" }, h("div", { className: "v", style: { color: "var(--good)" } }, counts.p), h("div", { className: "l" }, "promoted → Doppl")),
      h("div", { className: "stat" }, h("div", { className: "v", style: { color: "var(--bad)" } }, counts.r), h("div", { className: "l" }, "rejected")),
      h("div", { className: "stat" }, h("div", { className: "v", style: { color: "var(--blue)" } }, "demo-fit"), h("div", { className: "l", style: { cursor: "pointer" }, onClick: () => setLensInfo(v => !v) }, "active lens ⓘ"))
    ),
    lensInfo && h("div", { className: "note", style: { marginTop: -8, marginBottom: 16 } },
      h("b", null, "The lens is swappable. "), "Every idea is scored through a perspective — here ",
      h("b", null, "capstone-demo-fit"), " (“could a 3–4 person team show this live in two weeks and make a room go oh?”). Swap to ",
      h("i", null, "arbitrage"), " or ", h("i", null, "build-moat"), " and the same ideas re-rank. Score is signed: ",
      h("b", { style: { color: "var(--good)" } }, "+"), " worth surfacing, ", h("b", null, "0"), " meh, ",
      h("b", { style: { color: "var(--bad)" } }, "−"), " an active trap."
    ),
    h("div", { className: "toolbar" },
      ["all", "zeitgeist", "transfer", "promoted"].map((f) =>
        h("div", { key: f, className: "chip " + (filter === f ? "on" : ""), onClick: () => setFilter(f) },
          f === "all" ? "All ideas" : f[0].toUpperCase() + f.slice(1))
      )
    ),
    h("div", { className: "grid" },
      shown.map((it) => h(IdeaCard, { key: it.id, it, status: statuses[it.id], set }))
    )
  );
}

function IdeaCard({ it, status, set }) {
  const s = it.lens_score;
  return h("div", { className: "card " + (status || "") },
    h("div", { className: "chead" },
      h("div", { className: "score", style: { background: scoreColor(s) } }, scoreText(s)),
      h("div", null,
        h("div", { className: "ctitle" }, it.title),
        h("div", { className: "pillrow" },
          h("span", { className: "pill " + (it.subtype === "zeitgeist_synthesis" ? "z" : "t") }, subShort[it.subtype]),
          h("span", { className: "pill src" }, it.source.replace("corpus:case-studies", "corpus")),
          it.disposition === "open"
            ? h("span", { className: "pill" }, "→ Doppl")
            : h("span", { className: "pill" }, "→ keep"),
          status && h("span", { className: "pill st", style: status === "rejected" ? { color: "var(--bad)" } : {} }, status)
        )
      )
    ),
    h("div", { className: "why" }, it.why_it_might_matter),
    h("div", { className: "pr" },
      h("div", null, h("b", null, "hidden variable"), it.hidden_variable),
      h("div", null, h("b", null, "actual problem"), it.actual_problem)
    ),
    h("div", { className: "acts" },
      h("button", { className: "btn promote " + (status === "promoted" ? "active" : ""), onClick: () => set(it.id, "promoted") }, "▲ Promote"),
      h("button", { className: "btn reject " + (status === "rejected" ? "active" : ""), onClick: () => set(it.id, "rejected") }, "▼ Reject")
    )
  );
}

/* ===================================================================== */
/* VIEW 3 — SOURCES (registry + access ladder)                            */
/* ===================================================================== */
const LADDER = [
  { n: "1", lab: "Free (API / RSS / GET)", sub: "HN, Lobsters, arXiv, GitHub, YC, EDGAR — the cheap baseline", cost: "free", costlab: "free" },
  { n: "2", lab: "curl_cffi — stealth GET", sub: "mimics Chrome TLS/JA3 to pass fingerprint walls, no browser", cost: "cheap", costlab: "cheap" },
  { n: "3", lab: "Firecrawl", sub: "clean markdown per page (key) — the thin-headline fix", cost: "cheap", costlab: "~1cr/pg" },
  { n: "4", lab: "Browser (browser-use / Browserbase)", sub: "JS / auth / anti-bot — costly last resort", cost: "dear", costlab: "$$$" },
  { n: "→", lab: "Dispatch — hand to a native agent", sub: "Gemini for YouTube, Grok for X — flat-rate on a sub you already pay", cost: "free", costlab: "sub" },
];

function Sources() {
  const reg = DATA.registry;
  const recipes = DATA.recipes;
  const maxAvg = Math.max(...reg.map((r) => r.avg || 0), 4);
  return h("div", { className: "view pad" },
    h("div", { className: "two" },
      h("div", null,
        h("h3", { className: "sec" }, "Source registry — score the wells, per lens"),
        h("table", null,
          h("thead", null, h("tr", null, ["Source", "Lens", "Vol", "Avg score", "Status"].map((c) => h("th", { key: c }, c)))),
          h("tbody", null, reg.map((r, i) =>
            h("tr", { key: i },
              h("td", null, r.source),
              h("td", { style: { color: "var(--faint)" } }, r.lens),
              h("td", null, r.vol),
              h("td", null, r.avg == null ? "—" :
                h("div", null, r.avg, h("div", { className: "bar" }, h("span", { style: { width: (100 * r.avg / maxAvg) + "%" } })))),
              h("td", { className: "s-" + r.status }, r.status)
            )
          ))
        ),
        h("div", { className: "note" },
          h("b", null, "The registry learns where to look. "), "Each well is scored by the hit-rate of what it yields — ",
          "and once you promote ideas, a ", h("b", null, "worth_unlocking"), " flag fires for a walled source that proves it pays ",
          "(e.g. “X earned 1.0 promotion-rate → spend on Grok”). The budgeted-bandit, made real."
        )
      ),
      h("div", null,
        h("h3", { className: "sec" }, "Access ladder — cheapest tool that works"),
        h("div", { className: "ladder" },
          LADDER.map((r, i) =>
            h("div", { className: "rung", key: i },
              h("div", { className: "n" }, r.n),
              h("div", null, h("div", { className: "lab" }, r.lab), h("div", { className: "sub" }, r.sub)),
              h("div", { className: "cost " + r.cost }, r.costlab)
            )
          )
        ),
        h("h3", { className: "sec", style: { marginTop: 22 } }, "Per-source recipe + connector backlog"),
        h("table", null,
          h("thead", null, h("tr", null, ["Source", "Tier", "Status", "Connector?"].map((c) => h("th", { key: c }, c)))),
          h("tbody", null, recipes.map((r, i) =>
            h("tr", { key: i },
              h("td", null, r.source),
              h("td", { style: { color: "var(--cyan)" } }, r.tier),
              h("td", { className: "s-" + r.status }, r.status),
              h("td", { style: { color: "var(--dim)", fontSize: "11.5px" } }, r.mcp ? r.mcp.split(" —")[0].split(" (")[0] : "—")
            )
          ))
        )
      )
    )
  );
}

/* ===================================================================== */
/* APP                                                                    */
/* ===================================================================== */
function App() {
  const [tab, setTab] = useState("pipeline");
  const tabs = [
    ["pipeline", "How it works"],
    ["ideas", "The ideas"],
    ["sources", "Sources & access"],
  ];
  return h("div", { className: "app" },
    h("header", null,
      h("h1", null, h("span", { className: "accent" }, "Doppl Discovery"), " — the pointing finger"),
      h("p", null, "A scheduled radar that harvests live signal, recovers the real problem behind each item, and ranks candidates through a swappable lens. It ", h("b", { style: { color: "var(--ink)" } }, "points"), " (“that might be an opportunity”); Doppl ", h("b", { style: { color: "var(--ink)" } }, "checks"), " (“is it or isn’t it”); the expressions ", h("b", { style: { color: "var(--ink)" } }, "validate"), "."),
      h("div", { className: "tabs" },
        tabs.map(([k, label]) =>
          h("div", { key: k, className: "tab " + (tab === k ? "active" : ""), onClick: () => setTab(k) }, label)
        )
      )
    ),
    h("main", null,
      tab === "pipeline" && h(Pipeline),
      tab === "ideas" && h(Ideas),
      tab === "sources" && h(Sources)
    )
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
