services:
  neo4j:
    image: neo4j:5
    container_name: doppl-knowledge-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
      - 'NEO4J_browser_post__connect__cmd=MATCH path = (:Run {id: "run-rich-runtime-1"})-[*1..3]-() RETURN path LIMIT 80;'
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

volumes:
  neo4j-data:
  neo4j-logs:
