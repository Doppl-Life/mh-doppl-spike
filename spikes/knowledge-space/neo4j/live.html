<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doppl Neo4j Live Graph</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #64748b;
      --line: #d8dee9;
      --panel: #ffffff;
      --bg: #f6f8fb;
      --accent: #0f766e;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      align-items: center;
      background: #101827;
      color: white;
      display: flex;
      gap: 18px;
      justify-content: space-between;
      padding: 16px 22px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
    }
    .status {
      color: #cbd5e1;
      font-size: 13px;
    }
    main {
      display: grid;
      gap: 14px;
      grid-template-columns: minmax(0, 1fr) 340px;
      padding: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      min-width: 0;
    }
    .toolbar {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 10px;
      padding: 10px;
    }
    button {
      background: #eef7f5;
      border: 1px solid #9dd3c9;
      color: #134e4a;
      cursor: pointer;
      font: inherit;
      padding: 7px 10px;
    }
    button:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    code {
      color: var(--muted);
      font-size: 12px;
    }
    svg {
      background:
        linear-gradient(#e5eaf1 1px, transparent 1px),
        linear-gradient(90deg, #e5eaf1 1px, transparent 1px),
        #fbfdff;
      background-size: 34px 34px;
      display: block;
      height: calc(100vh - 124px);
      min-height: 620px;
      width: 100%;
    }
    line {
      stroke: #94a3b8;
      stroke-width: 1.5;
      opacity: 0.72;
    }
    circle {
      cursor: pointer;
      stroke: white;
      stroke-width: 2;
    }
    text {
      fill: var(--ink);
      font-size: 12px;
      pointer-events: none;
    }
    aside {
      display: grid;
      gap: 12px;
      align-content: start;
      padding: 14px;
    }
    aside h2 {
      font-size: 15px;
      margin: 0;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .kv {
      color: #334155;
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      align-items: center;
      border: 1px solid var(--line);
      display: inline-flex;
      gap: 6px;
      padding: 5px 7px;
      font-size: 12px;
    }
    .dot {
      border-radius: 50%;
      height: 10px;
      width: 10px;
    }
    @media (max-width: 920px) {
      main {
        grid-template-columns: 1fr;
      }
      svg {
        height: 560px;
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Doppl Neo4j Live Graph</h1>
    <div class="status" id="status">Connecting to local Neo4j...</div>
  </header>
  <main>
    <section class="panel">
      <div class="toolbar">
        <button type="button" id="reload">Reload</button>
        <code id="query-label"></code>
      </div>
      <svg id="graph" role="img" aria-label="Live Neo4j graph query result"></svg>
    </section>
    <aside class="panel" id="detail">
      <h2>Selection</h2>
      <p class="muted">The graph query runs automatically against the local Neo4j Query API. Select a node to inspect labels and properties.</p>
      <div class="legend" id="legend"></div>
    </aside>
  </main>
  <script>
    const statement = "MATCH path = (:Run {id: 'run-rich-runtime-1'})-[*1..3]-() RETURN path LIMIT 80";
    const endpoint = "http://localhost:7474/db/neo4j/query/v2";
    const colors = {
      Agenome: "#4f46e5",
      Candidate: "#2563eb",
      CheckResult: "#65a30d",
      CriticReview: "#be123c",
      FitnessScore: "#ca8a04",
      Generation: "#0369a1",
      KnowledgeRecord: "#7c3aed",
      NoveltyScore: "#db2777",
      Run: "#0f172a",
      RunEventReceipt: "#0891b2",
      RunEventWatermark: "#16a34a"
    };
    const svg = document.getElementById("graph");
    const status = document.getElementById("status");
    const detail = document.getElementById("detail");
    document.getElementById("query-label").textContent = statement;
    document.getElementById("reload").addEventListener("click", loadGraph);

    function labelFor(node) {
      const props = node.properties || {};
      return props.title || props.label || props.id || node.labels?.[0] || node.elementId;
    }

    function parsePaths(values) {
      const nodes = new Map();
      const edges = new Map();
      for (const row of values) {
        const path = row[0] || [];
        for (const item of path) {
          if (item.labels) {
            nodes.set(item.elementId, {
              id: item.elementId,
              label: labelFor(item),
              labels: item.labels,
              type: item.labels[0] || "Node",
              properties: item.properties || {}
            });
          } else if (item.type) {
            edges.set(item.elementId, {
              id: item.elementId,
              source: item.startNodeElementId,
              target: item.endNodeElementId,
              type: item.type
            });
          }
        }
      }
      return { nodes: [...nodes.values()], edges: [...edges.values()] };
    }

    async function loadGraph() {
      status.textContent = "Running query...";
      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ statement })
        });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const payload = await response.json();
        if (payload.errors?.length) throw new Error(payload.errors.map((item) => item.message).join("; "));
        const graph = parsePaths(payload.data.values);
        status.textContent = `${graph.nodes.length} nodes, ${graph.edges.length} relationships`;
        renderLegend(graph.nodes);
        renderGraph(graph);
      } catch (error) {
        status.textContent = "Unable to query local Neo4j";
        svg.innerHTML = "";
        detail.innerHTML = `<h2>Connection</h2><p class="muted">${escapeHtml(error.message)}. Run <code>spikes/knowledge-space/neo4j/import.sh</code>, then reload this page.</p>`;
      }
    }

    function renderLegend(nodes) {
      const types = [...new Set(nodes.map((node) => node.type))].sort();
      document.getElementById("legend").innerHTML = types.map((type) =>
        `<span class="chip"><span class="dot" style="background:${colors[type] || "#475569"}"></span>${escapeHtml(type)}</span>`
      ).join("");
    }

    function renderGraph(graph) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 620;
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      const nodeById = new Map(graph.nodes.map((node) => [node.id, node]));
      const degree = new Map(graph.nodes.map((node) => [node.id, 0]));
      graph.edges.forEach((edge) => {
        degree.set(edge.source, (degree.get(edge.source) || 0) + 1);
        degree.set(edge.target, (degree.get(edge.target) || 0) + 1);
      });
      graph.nodes.forEach((node, index) => {
        const angle = (index / Math.max(1, graph.nodes.length)) * Math.PI * 2;
        const radius = node.type === "Run" ? 0 : Math.min(width, height) * (0.24 + (index % 5) * 0.025);
        node.x = width / 2 + Math.cos(angle) * radius;
        node.y = height / 2 + Math.sin(angle) * radius;
        if (node.type === "Run") {
          node.x = width / 2;
          node.y = height / 2;
        }
      });
      for (let tick = 0; tick < 180; tick++) {
        for (let i = 0; i < graph.nodes.length; i++) {
          for (let j = i + 1; j < graph.nodes.length; j++) {
            const a = graph.nodes[i];
            const b = graph.nodes[j];
            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let distance = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            const force = 560 / (distance * distance);
            dx /= distance;
            dy /= distance;
            a.x += dx * force;
            a.y += dy * force;
            b.x -= dx * force;
            b.y -= dy * force;
          }
        }
        for (const edge of graph.edges) {
          const a = nodeById.get(edge.source);
          const b = nodeById.get(edge.target);
          if (!a || !b) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const distance = Math.max(1, Math.sqrt(dx * dx + dy * dy));
          const desired = edge.type.includes("RECEIPT") ? 118 : 150;
          const force = (distance - desired) * 0.025;
          const nx = dx / distance;
          const ny = dy / distance;
          a.x += nx * force;
          a.y += ny * force;
          b.x -= nx * force;
          b.y -= ny * force;
        }
        graph.nodes.forEach((node) => {
          node.x += (width / 2 - node.x) * 0.004;
          node.y += (height / 2 - node.y) * 0.004;
          node.x = Math.max(24, Math.min(width - 160, node.x));
          node.y = Math.max(24, Math.min(height - 24, node.y));
        });
      }
      svg.innerHTML = "";
      graph.edges.forEach((edge) => {
        const a = nodeById.get(edge.source);
        const b = nodeById.get(edge.target);
        if (!a || !b) return;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", a.x);
        line.setAttribute("y1", a.y);
        line.setAttribute("x2", b.x);
        line.setAttribute("y2", b.y);
        line.appendChild(document.createElementNS("http://www.w3.org/2000/svg", "title")).textContent = edge.type;
        svg.appendChild(line);
      });
      graph.nodes.forEach((node) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("tabindex", "0");
        group.setAttribute("role", "button");
        group.setAttribute("aria-label", `${node.type} ${node.label}`);
        group.addEventListener("click", () => showDetail(node, graph.edges));
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            showDetail(node, graph.edges);
          }
        });
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", node.x);
        circle.setAttribute("cy", node.y);
        circle.setAttribute("r", node.type === "Run" ? 16 : Math.min(13, 7 + (degree.get(node.id) || 0)));
        circle.setAttribute("fill", colors[node.type] || "#475569");
        group.appendChild(circle);
        if (graph.nodes.length <= 80 || ["Run", "Generation", "Agenome", "Candidate"].includes(node.type)) {
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", node.x + 18);
          text.setAttribute("y", node.y + 4);
          text.textContent = String(node.label).slice(0, 38);
          group.appendChild(text);
        }
        svg.appendChild(group);
      });
    }

    function showDetail(node, edges) {
      const props = Object.entries(node.properties || {})
        .map(([key, value]) => `<div class="kv"><strong>${escapeHtml(key)}:</strong> ${escapeHtml(Array.isArray(value) ? value.join(", ") : value)}</div>`)
        .join("");
      const linked = edges
        .filter((edge) => edge.source === node.id || edge.target === node.id)
        .slice(0, 14)
        .map((edge) => `<li>${escapeHtml(edge.type)}</li>`)
        .join("");
      detail.innerHTML = `
        <h2>${escapeHtml(node.label)}</h2>
        <div class="kv"><strong>Labels:</strong> ${escapeHtml(node.labels.join(", "))}</div>
        ${props}
        <div class="kv"><strong>Relationships:</strong></div>
        <ul>${linked || "<li>None</li>"}</ul>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    loadGraph();
  </script>
</body>
</html>
